<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block Elements</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>Hey I am a para (Block Element)</p>
    <a href="https://google.com">Google (Inline Element)</a>
    <div>I am a div (Block Element)</div>
    <span>I am a span (Inline Element)</span>
    <a href="#">I am also inline</a>
</body>
</html>
