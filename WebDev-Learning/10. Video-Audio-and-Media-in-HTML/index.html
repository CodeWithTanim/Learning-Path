<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media - Video, Audio and Media</title>
</head>

<body>
    <video src="video.mp4" height="500" width="auto" controls></video>
    <video src="video.mp4" height="500" width="auto" controls autoplay></video>
    <video src="video.mp4" height="500" width="auto" controls autoplay muted></video>
    <video src="video.mp4" height="500" width="auto" controls loop autoplay muted></video>
    <video src="video.mp4" height="255" controls loop muted poster="image.jpg"></video>

    <audio src="audio.mp3" controls preload="auto"></audio>

    <hr>

    <h3>SVG Example</h3>
    <svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="40" stroke="green" stroke-width="4" fill="yellow" />
    </svg>

    <hr>

    <h3>iFrame Example (YouTube Embed)</h3>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/tVzUXW6siu0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

    <hr>

    <h3>iFrame Example (Website Embed)</h3>
    <iframe src="https://www.wikipedia.org" width="100%" height="500"></iframe>

</body>

</html>
